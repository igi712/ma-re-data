name: Purge Repository History & Remove All Heavy Binaries
on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Nuke All Heavy Assets & Rewrite History
        run: |
          # 1. Create a fresh branch with no history
          git checkout --orphan temp-branch
          
          # 2. Physical removal of ALL heavy media and image directories
          rm -rf Sound Video Video_en
          rm -rf resource/image_native resource/movie resource/movie_en resource/sound_native
          
          # 3. Stage only the lightweight code, tools, and text translation JSONs
          git add -A
          
          # 4. Create the single clean commit
          git commit -m "System: Cleaned repository core (removed assets > 2GB)"
          
          # 5. Overwrite the main branch locally on the runner
          git branch -D main
          git branch -m main
          
          # 6. Force-push the lightweight repository (will succeed instantly)
          git push -f origin main
